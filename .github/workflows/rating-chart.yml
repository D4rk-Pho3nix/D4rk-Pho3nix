# Create GH_TOKEN_1 at github.com/settings/tokens (repo read/write + workflow)
# Add WAKATIME_API_KEY from wakatime.com/settings/account (Secret API Key)

name: Update Readme WakaTime chart with random cron interval
on:
  push:
    branches: master
    paths-ignore:
      - README.md
      - .github/workflows/rating-chart.yml
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
jobs:
  wakatime-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN_1 }}
        name: Checkout repo

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
        name: Setup Python

      - run: pip install -r requirements.txt
        name: Install dependencies

      - name: Generate WakaTime chart
        run: python codes/wakatime_chart.py > chart.txt
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}

      - name: Rebuild README
        run: |
          cat assets/README-1.md > README.md
          cat chart.txt >> README.md
          currentDate=`env TZ=America/New_York date`
          printf "\nChart last updated - ${currentDate}" >> README.md
          cat assets/README-2.md >> README.md

      - name: Update workflow with random cron
        run: |
          python codes/generate_random_workflow.py > rating-yaml.txt
          cat rating-yaml.txt > .github/workflows/rating-chart.yml

      - id: changed
        run: git diff --exit-code
        continue-on-error: true
        name: Check for changes

      - if: ${{ steps.changed.outcome == 'failure' }}
        uses: EndBug/add-and-commit@v9
        with:
          author_name: D4rk-Pho3nix
          author_email: github-actions[bot]@users.noreply.github.com
          message: "Auto updating my readme and workflow timing!"
          add: "README.md .github/workflows/rating-chart.yml"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_1 }}
        name: Commit changes
